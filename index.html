<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const isDark = savedTheme ? savedTheme === "dark" : prefersDark;
        document.documentElement.classList.toggle("dark", isDark);
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      } catch {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <style>
    html,
    body,
    #root {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }

    html.dark,
    html.dark body,
    html.dark #root {
      background: #050505;
    }
  </style>
  <title>Shubham Pathak | Full Stack Developer</title>
  <meta name="description"
    content="Software Engineer and Full Stack Developer based in Vadodara, Gujarat. Specialized in React, TypeScript, and Rust. Engineering high-performance software systems." />
  <meta name="keywords"
    content="Shubham Pathak, Full Stack Developer India, Front End Developer Vadodara, Freelance Developer Gujarat, Software Engineer India, Hire React Developer, Rust Developer Vadodara" />
  <meta name="author" content="Shubham Pathak" />
  <meta name="theme-color" content="#050505" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://shubhampathak.vercel.app/" />

  <!-- Open Graph / Facebook -->

  <meta property="og:type" content="website" />
</head>

</body>

</html>
